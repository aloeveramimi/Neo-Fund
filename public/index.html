<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💸 Transaction Logger</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0eefa; min-height: 100vh; padding: 1.5rem 1rem; color: #1a1a2e; max-width: 480px; margin: 0 auto; }
h1 { font-size: 18px; font-weight: 700; color: #534AB7; margin-bottom: 1.25rem; }
.card { background: #fff; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1rem; box-shadow: 0 1px 5px rgba(83,74,183,0.08); }
.lbl { font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }
input[type=text], input[type=password], select { width: 100%; padding: 8px 10px; border: 1px solid #e0ddf5; border-radius: 8px; font-size: 13px; font-family: inherit; background: #faf9ff; color: #1a1a2e; margin-top: 3px; outline: none; transition: border .15s; }
.upload-zone { border: 2px dashed #c5c0f0; border-radius: 10px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; }
.upload-zone:hover { background: #f0ebff; }
.field-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid #f0eefa; font-size:13px; gap:8px; }
.fv { flex:1; }
.fv input, .fv select { background:transparent; border:none; border-bottom:1px solid #e0ddf5; width:100%; font-size:13px; }
.btn { width:100%; padding:12px; font-size:14px; font-weight:600; border:none; border-radius:10px; cursor:pointer; margin-top:8px; }
.btn-p { background:#7F77DD; color:#fff; }
.btn-s { background:#ede9ff; color:#534AB7; }
.status { font-size:13px; padding:9px 12px; border-radius:8px; margin-top:8px; background:#f4f3fb; }
</style>
</head>
<body>

<h1>💸 Transaction Logger (Batch)</h1>

<div class="card">
  <div class="lbl">Screenshot giao dịch (Chọn nhiều ảnh)</div>
  <div class="upload-zone" onclick="document.getElementById('fi').click()">
    <div style="font-size:28px">📲</div>
    <div style="font-size:14px;color:#888">Chọn nhiều ảnh bill cùng lúc</div>
  </div>
  <input type="file" id="fi" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
</div>

<div class="card" id="exCard" style="display:none">
  <div class="lbl" id="billCount">Review & chỉnh sửa</div>
  <div id="fields"></div>
</div>

<div id="st" class="status" style="display:none"></div>

<button class="btn btn-p" id="scanBtn" style="display:none" onclick="scan()">🔍 Quét hàng loạt</button>
<button class="btn btn-s" id="subBtn" style="display:none" onclick="submitRow()">📊 Thêm bill này vào Sheet</button>

<script>
const TYPES = ['Income','Expense','Advance & Reimbursement','Adjustment'];
const FROMS = ['Treasury','Lisa','Bianca','Huck','Megan','TPBank']; 
const TOS   = ['Treasury','Lisa','Bianca','Huck','Megan','External'];
const CATS  = ['Contribution','Groceries','Food and Drinks','Coffee','Rent','Utilities','Transport','Work','Emergency','Misc','Transfer','Reward','Fine','Health'];
const METHODS = ['Cash','Bank'];

let imagesBase64 = [];
let exList = []; // Danh sách bill sau khi AI đọc
let currentIndex = 0; // Bill đang review
let ex = {}; // Bill hiện tại đang chỉnh sửa

// Hàm convert file sang Base64
function toBase64(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 768; canvas.height = img.height * (768/img.width);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

async function handleFiles(files) {
    imagesBase64 = [];
    setStatus('Đang xử lý ảnh...');
    for (let f of files) imagesBase64.push(await toBase64(f));
    document.getElementById('scanBtn').style.display = 'block';
    setStatus(`Đã chọn ${imagesBase64.length} ảnh. Bấm "Quét hàng loạt".`);
}

async function scan() {
    document.getElementById('scanBtn').disabled = true;
    setStatus('Đang nhờ AI phân tích...');
    try {
        const res = await fetch('/api/extract', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ images: imagesBase64, userSelected: document.getElementById('userRole')?.value || 'Treasury' })
        });
        exList = await res.json();
        currentIndex = 0;
        reviewNext();
    } catch(e) { setStatus('Lỗi: '+e.message); }
    document.getElementById('scanBtn').disabled = false;
}

function reviewNext() {
    if(currentIndex < exList.length) {
        ex = exList[currentIndex];
        renderFields();
        document.getElementById('exCard').style.display = 'block';
        document.getElementById('subBtn').style.display = 'block';
        document.getElementById('billCount').innerText = `Review bill ${currentIndex + 1}/${exList.length}`;
        setStatus('');
    } else {
        setStatus('✅ Đã duyệt xong toàn bộ!');
        document.getElementById('exCard').style.display = 'none';
        document.getElementById('subBtn').style.display = 'none';
    }
}

function renderFields(){
    const f=document.getElementById('fields');
    const row=(l,c)=>`<div class="field-row"><span class="fl">${l}</span><span class="fv">${c}</span></div>`;
    const sel=(n,v,opts)=>`<select onchange="ex['${n}']=this.value">${opts.map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('')}</select>`;
    const inp=(n,v)=>`<input type="text" value="${v||''}" oninput="ex['${n}']=this.value">`;
    f.innerHTML=[
        row('Timestamp', inp('timestamp',ex.timestamp)),
        row('Type', sel('type',ex.type,TYPES)),
        row('From', sel('from',ex.from,FROMS)),
        row('To', sel('to',ex.to,TOS)),
        row('Category', sel('category',ex.category,CATS)),
        row('Amount', inp('amount',ex.amount)),
        row('Description', inp('description',ex.description)),
        row('Note', inp('note',ex.note))
    ].join('');
}

async function submitRow(){
    document.getElementById('subBtn').disabled = true;
    const rowVals = Object.values(ex);
    
    await fetch('/api/append',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({sheetName: 'Member', row: rowVals})
    });
    
    setStatus(`Đã lưu bill ${currentIndex + 1}`);
    currentIndex++;
    document.getElementById('subBtn').disabled = false;
    reviewNext();
}

function setStatus(msg){
    const e = document.getElementById('st');
    e.style.display = 'block'; e.innerHTML = msg;
}
</script>
</body>
</html>
