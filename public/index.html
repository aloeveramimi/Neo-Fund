<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💸 Transaction Logger</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0eefa; min-height: 100vh; padding: 1.5rem 1rem; color: #1a1a2e; max-width: 480px; margin: 0 auto; }
h1 { font-size: 18px; font-weight: 700; color: #534AB7; margin-bottom: 1.25rem; }
.card { background: #fff; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1rem; box-shadow: 0 1px 5px rgba(83,74,183,0.08); }
.lbl { font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }
input[type=text], input[type=password], select {
  width: 100%; padding: 8px 10px; border: 1px solid #e0ddf5; border-radius: 8px;
  font-size: 13px; font-family: inherit; background: #faf9ff; color: #1a1a2e;
  margin-top: 3px; outline: none; transition: border .15s;
}
input:focus, select:focus { border-color: #7F77DD; }
.upload-zone { border: 2px dashed #c5c0f0; border-radius: 10px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: background .15s; }
.upload-zone:hover, .upload-zone.drag { background: #f0ebff; }
.prev { width:100%; border-radius:8px; margin-top:10px; max-height:220px; object-fit:contain; display:none; }
.field-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid #f0eefa; font-size:13px; gap:8px; }
.field-row:last-child { border-bottom:none; }
.fl { color:#999; flex:0 0 88px; font-size:12px; }
.fv { flex:1; }
.fv input, .fv select { margin-top:0; text-align:right; background:transparent; border:none; border-bottom:1px solid #e0ddf5; border-radius:0; padding:2px 4px; width:100%; font-size:13px; font-family:inherit; color:#1a1a2e; }
.fv select { text-align-last:right; }
.btn { width:100%; padding:12px; font-size:14px; font-weight:600; border:none; border-radius:10px; cursor:pointer; transition:opacity .15s; margin-top:8px; }
.btn-p { background:#7F77DD; color:#fff; }
.btn-p:hover { opacity:.87; }
.btn-p:disabled { opacity:.4; cursor:not-allowed; }
.btn-s { background:#ede9ff; color:#534AB7; }
.btn-s:hover { background:#e0d9ff; }
.btn-s:disabled { opacity:.4; cursor:not-allowed; }
.status { font-size:13px; padding:9px 12px; border-radius:8px; margin-top:8px; line-height:1.5; }
.sl { background:#f4f3fb; color:#666; }
.ss { background:#eafaf2; color:#1a7a4a; }
.se { background:#fdf0f0; color:#c0392b; }
.sp { display:inline-block; width:11px; height:11px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; animation:spin .7s linear infinite; margin-right:6px; vertical-align:-1px; }
@keyframes spin { to { transform:rotate(360deg); } }
.note-sm { font-size:11px; color:#bbb; margin-top:3px; line-height:1.4; }
</style>
</head>
<body>

<h1>💸 Transaction Logger</h1>

<div class="card" id="configCard">
  <div class="lbl">Phân quyền tài khoản</div>
  <div>
    <div style="font-size:12px;color:#777; font-weight:600;">I am (Bạn là ai?)</div>
    <select id="userRole" onchange="updateTabNotice()">
      <option value="Megan">Megan</option>
      <option value="Bianca">Bianca</option>
      <option value="Huck">Huck</option>
      <option value="Lisa">Lisa</option>
      <option value="Treasury">Treasury (Quản lý Quỹ)</option>
    </select>
    <div class="note-sm" id="tabNotice">Sẵn sàng phân tích luồng hóa đơn...</div>
  </div>
</div>

<div class="card">
  <div class="lbl">Screenshot giao dịch</div>
  <div class="upload-zone" id="dz" onclick="document.getElementById('fi').click()">
    <div style="font-size:28px;margin-bottom:6px">📲</div>
    <div style="font-size:14px;color:#888">Tap để upload screenshot ngân hàng</div>
    <div style="font-size:12px;color:#bbb;margin-top:4px">PNG, JPG</div>
  </div>
  <input type="file" id="fi" accept="image/*" style="display:none">
  <img id="prev" class="prev">
</div>

<div class="card" id="exCard" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="lbl" style="margin:0">Review & chỉnh sửa</div>
    <span style="font-size:11px;padding:2px 8px;background:#ede9ff;color:#534AB7;border-radius:6px;font-weight:500">✦ AI đọc</span>
  </div>
  <div id="fields"></div>
</div>

<div id="st" style="display:none"></div>

<button class="btn btn-p" id="scanBtn" style="display:none" onclick="scan()">🔍 Đọc screenshot</button>
<button class="btn btn-s" id="subBtn"  style="display:none" onclick="submitRow()">📊 Thêm vào Google Sheet</button>

<script>
const TYPES   = ['Income','Expense','Advance & Reimbursement','Adjustment'];
const FROMS   = ['Treasury','Lisa','Bianca','Huck','Megan','TPBank']; // ĐÃ BỎ EXTERNAL KHỎI LIST FROM
const TOS     = ['Treasury','Lisa','Bianca','Huck','Megan','External'];
const CATS    = ['Contribution','Groceries','Food and Drinks','Coffee','Rent','Utilities','Transport','Work','Emergency','Misc','Transfer','Reward','Fine','Health',"Huck's undefined expense"];
const METHODS = ['Cash','Bank'];

let b64=null, mime='image/jpeg', ex={};

window.addEventListener('load',()=>{
  const savedRole = localStorage.getItem('tl_userRole');
  if(savedRole) document.getElementById('userRole').value = savedRole;
  updateTabNotice();
  document.getElementById('userRole').addEventListener('change', function() {
    localStorage.setItem('tl_userRole', this.value);
    updateTabNotice();
  });
});

function updateTabNotice() {
  const role = document.getElementById('userRole').value;
  if(ex.type) {
    if(ex.type === 'Income' || ex.type === 'Advance & Reimbursement') {
      document.getElementById('tabNotice').innerHTML = `Giao dịch song phương: Tự động ghi vào cả <b style="color:#534AB7">Member</b> & <b style="color:#534AB7">Treasury</b>`;
    } else {
      const target = (role === 'Treasury') ? 'Treasury' : 'Member';
      document.getElementById('tabNotice').innerHTML = `Giao dịch đơn phương: Sẽ ghi vào trang <b style="color:#534AB7">${target}</b>`;
    }
  } else {
    document.getElementById('tabNotice').innerHTML = `Sẵn sàng phân tích luồng hóa đơn...`;
  }
}

const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)load(f);});
document.getElementById('fi').addEventListener('change',function(){if(this.files[0])load(this.files[0]);});

function load(file){
  mime=file.type||'image/jpeg'; if(mime==='image/jpg')mime='image/jpeg';
  const r=new FileReader();
  r.onload=e=>{
    const d=e.target.result, m=d.match(/^data:(image\/[a-zA-Z+]+);base64,/);
    if(m){mime=m[1]; if(mime==='image/jpg')mime='image/jpeg';}
    b64=d.split(',')[1];
    const p=document.getElementById('prev'); p.src=d; p.style.display='block';
    document.getElementById('scanBtn').style.display='block';
    document.getElementById('exCard').style.display='none';
    document.getElementById('subBtn').style.display='none';
    setStatus('');
    ex={};
    updateTabNotice();
  };
  r.readAsDataURL(file);
}

function setStatus(msg,type='sl'){
  const e=document.getElementById('st');
  if(!msg){e.style.display='none';return;}
  e.style.display='block'; e.className='status '+type;
  e.innerHTML=type==='sl'?`<span class="sp"></span>${msg}`:msg;
}

async function scan(){
  if(!b64)return;
  const userSelected = document.getElementById('userRole').value;
  document.getElementById('scanBtn').disabled=true;
  setStatus('Đang đọc screenshot…');
  try{
    const res=await fetch('/api/extract',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:b64,mime,userSelected})
    });
    const data=await res.json();
    if(data.error){setStatus('Lỗi: '+data.error,'se');document.getElementById('scanBtn').disabled=false;return;}
    ex=data; renderFields();
    document.getElementById('exCard').style.display='block';
    document.getElementById('subBtn').style.display='block';
    updateTabNotice();
    setStatus('');
  }catch(e){setStatus('Lỗi kết nối: '+e.message,'se');}
  document.getElementById('scanBtn').disabled=false;
}

function renderFields(){
  const f=document.getElementById('fields');
  const sel=(n,v,opts)=>`<select onchange="ex['${n}']=this.value; if('${n}'==='type') updateTabNotice();">${opts.map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('')}</select>`;
  const inp=(n,v)=>`<input type="text" value="${String(v||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}" oninput="ex['${n}']=this.value">`;
  f.innerHTML=[
    row('Timestamp', inp('timestamp',ex.timestamp)),
    row('Type',      sel('type',ex.type,TYPES)),
    row('From',      sel('from',ex.from,FROMS)),
    row('To',        sel('to',ex.to,TOS)),
    row('Category',  sel('category',ex.category,CATS)),
    row('Amount',    inp('amount',ex.amount)),
    row('Description',inp('description',ex.description)),
    row('Method',    sel('method',ex.method,METHODS)),
    row('Note',      inp('note',ex.note)),
  ].join('');
}
function row(l,c){return `<div class="field-row"><span class="fl">${l}</span><span class="fv">${c}</span></div>`;}

async function submitRow(){
  const role = document.getElementById('userRole').value;
  if(!ex.timestamp){setStatus('Chưa đọc gì cả, scan trước đi.','se');return;}
  
  document.getElementById('subBtn').disabled=true;
  setStatus('Đang ghi vào sheet…');
  
  const rowVals=[
    ex.timestamp||'','','',
    ex.type||'',ex.from||'',ex.to||'',ex.category||'',
    ex.amount||'',ex.description||'',ex.method||'',ex.note||''
  ];

  // LOGIC ĐỊNH TUYẾN TAB THÔNG MINH
  let targetSheets = [];
  if (ex.type === 'Income' || ex.type === 'Advance & Reimbursement') {
    targetSheets = ['Member', 'Treasury']; // Ghi đồng thời vào cả 2 bảng
  } else {
    targetSheets = [(role === 'Treasury') ? 'Treasury' : 'Member']; // Chỉ ghi vào bảng của người up
  }

  try {
    for (let sheetName of targetSheets) {
      const res = await fetch('/api/append',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({sheetName,row:rowVals})
      });
      const data = await res.json();
      if(data.error) {
        setStatus(`Lỗi khi lưu vào tab ${sheetName}: ` + data.error,'se');
        document.getElementById('subBtn').disabled=false;
        return;
      }
    }
    setStatus('✅ Đã thêm thành công vào Google Sheet!','ss');
  } catch(e) {
    setStatus('Lỗi: '+e.message,'se');
  }
  document.getElementById('subBtn').disabled=false;
}
</script>
</body>
</html>
